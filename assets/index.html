<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目文档</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: system-ui; max-width: 900px; margin: 2rem auto; padding: 1rem; }
    .lang-switch button { padding: 0.5rem 1.2rem; margin-right: 0.5rem; cursor: pointer; }
    .lang-switch button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    #content { margin-top: 2rem; }
  </style>
</head>
<body>

<div class="lang-switch">
  <button id="btn-zh">中文</button>
  <button id="btn-en">English</button>
</div>
<div id="content"></div>

<script>
  const btnZh = document.getElementById('btn-zh');
  const btnEn = document.getElementById('btn-en');
  const content = document.getElementById('content');

  async function loadDoc(lang) {
    const file = lang === 'zh' ? 'README.cn.md' : 'README.en.md';
    try {
      // 加上随机参数避免缓存干扰
      const res = await fetch(file + '?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
      const text = await res.text();
      content.innerHTML = marked.parse(text);
    } catch (err) {
      content.innerHTML = `<p style="color:red;">❌ 加载失败：${err.message}<br>
      请求文件：${file}<br>
      请检查：<br>
      1. 文件名大小写是否正确？<br>
      2. 文件是否已部署？（直接访问 <a href="${file}" target="_blank">${file}</a> 看是否404）</p>`;
    }
  }

  function switchTo(lang) {
    loadDoc(lang);
    btnZh.classList.toggle('active', lang === 'zh');
    btnEn.classList.toggle('active', lang === 'en');
    localStorage.setItem('lang', lang);
  }

  btnZh.addEventListener('click', () => switchTo('zh'));
  btnEn.addEventListener('click', () => switchTo('en'));

  const saved = localStorage.getItem('lang') || 'en';
  switchTo(saved);
</script>
</body>
</html>
